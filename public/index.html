<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Brasilguard - V2</title>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center h-screen">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl text-center w-96 border border-slate-700">
        <h1 class="text-2xl font-bold mb-2 text-blue-400">Brasilguard <span class="text-white">V2</span></h1>
        <p class="text-slate-400 text-sm mb-6">Validador de Chamadas STIR/SHAKEN</p>
        <button onclick="gerar()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition">Gerar Token</button>
        <div id="resultado" class="mt-6 p-4 bg-slate-900 rounded border border-slate-700 text-xs break-all hidden font-mono"></div>
    </div>
    <script>
        async function gerar() {
            const btn = event.target;
            btn.innerText = "Gerando...";
            const res = await fetch('/api/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ caller: "552199999999", destination: "552188888888" })
            });
            const data = await res.json();
            const div = document.getElementById('resultado');
            div.innerText = data.identity_token || "Erro na conexão";
            div.classList.remove('hidden');
            btn.innerText = "Gerar Token";
        }
    </script>
</body>
</html>
